name: Deploy to Play Store

on:
  push:
    tags:
      - v*.*.*

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Generate Version Name & Code
        id: versioning
        run: bash scripts/version.sh

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Decode Play Store JSON Key
        run: |
          mkdir -p fastlane
          echo "${{ secrets.PLAY_STORE_JSON_KEY }}" | base64 --decode > fastlane/google-play-key.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Build AppBundle (AAB)
        env:
          KEYSTORE_PATH: android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=${{ env.VERSION_NAME }} \
            --build-number=${{ env.VERSION_CODE }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Play Store (Internal)
        run: bundle exec fastlane deploy_internal
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification (Success)
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: '#00D4AA'
          SLACK_MESSAGE: "Spendly ${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }}) successfully deployed to Internal Track"
          SLACK_TITLE: Deployment Success

      - name: Slack Notification (Failure)
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: '#FF4C4C'
          SLACK_MESSAGE: "Failed to deploy Spendly ${{ env.VERSION_NAME }}. Check GitHub Actions log."
          SLACK_TITLE: Deployment Failed
