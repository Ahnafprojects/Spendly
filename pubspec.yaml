name: spendly

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0

  # UI & Design
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  
  # Backend & DB (Kita siapkan dari awal)
  supabase_flutter: ^2.3.0
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.1.0
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.0 # Untuk generate code SQLite
  build_runner: ^2.4.7 # Digunakan bersama drift
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon_1024.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/branding/app_icon_1024.png"
